<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Reseaux Sociaux Autopilote</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#F5F5F0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:clamp(1.4rem,3vw,1.8rem);text-align:center;margin-bottom:.5rem;color:#1A1A18}
.sub{text-align:center;color:#6B6963;margin-bottom:2rem;font-size:.9rem;max-width:500px}
.container{width:100%;max-width:480px}
.form-card{background:#fff;border:1px solid #E8E6E1;border-radius:12px;padding:20px;margin-bottom:16px}
.form-card h3{font-size:14px;margin-bottom:12px}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:12px;color:#6B6963;margin-bottom:4px}
.form-row input,.form-row select{width:100%;border:1px solid #E0DED8;border-radius:8px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:#fff}
.btn{background:#1D6B4F;color:#fff;border:none;border-radius:20px;padding:10px 24px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;width:100%}
.post{background:#fff;border:1px solid #E8E6E1;border-radius:12px;padding:16px;margin-bottom:10px;opacity:0;transform:translateY(12px);transition:all .4s ease}
.post.show{opacity:1;transform:none}
.post-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.post-avatar{width:36px;height:36px;border-radius:50%;background:#1D6B4F;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.post-name{font-size:13px;font-weight:700;color:#1A1A18}
.post-day{font-size:11px;color:#6B6963}
.post-body{font-size:13px;line-height:1.6;color:#333;margin-bottom:8px}
.post-tags{font-size:12px;color:#1D6B4F}
.post-bar{display:flex;gap:16px;padding-top:8px;border-top:1px solid #F0F0EB;font-size:11px;color:#6B6963;margin-top:8px}
.sched{display:inline-block;background:#E8F5EE;color:#1D6B4F;font-size:10px;font-weight:500;padding:2px 8px;border-radius:8px;margin-left:auto}
.cta-bottom{margin-top:2rem;text-align:center}
.cta-bottom a{display:inline-block;background:#1D6B4F;color:#fff;padding:.75rem 2rem;border-radius:50px;font-size:.9rem;text-decoration:none;font-weight:500}
.cta-bottom p{color:#6B6963;font-size:.8rem;margin-top:.5rem}
</style>
</head>
<body>

<h1>Reseaux sociaux en autopilote</h1>
<p class="sub">Donnez un theme. L'IA genere 5 posts prets a publier pour la semaine, planifies automatiquement.</p>

<div class="container">
<div class="form-card">
<h3>Quel est votre theme cette semaine ?</h3>
<div class="form-row">
<label>Theme ou bien a promouvoir</label>
<input type="text" id="theme" value="Villa T5 avec piscine a Nantes">
</div>
<div class="form-row">
<label>Reseau social</label>
<select id="reseau">
<option>Instagram</option>
<option>LinkedIn</option>
<option>Facebook</option>
</select>
</div>
<button class="btn" onclick="generate()">Generer les posts de la semaine</button>
</div>

<div id="posts"></div>
</div>

<div class="cta-bottom">
<a href="https://ginoess.github.io">Automatiser mes reseaux</a>
<p>99 euros par mois. Sans engagement.</p>
</div>

<script>
function generate() {
  const theme = document.getElementById('theme').value;
  const reseau = document.getElementById('reseau').value;
  const initials = theme.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const jours = ['Lundi 9h', 'Mercredi 12h', 'Vendredi 18h', 'Samedi 10h', 'Dimanche 11h'];

  const posts = [
    { body: `Nouveau bien disponible ! ${theme}. Un cadre exceptionnel pour votre prochain projet de vie. Contactez-nous pour une visite privee.`, tags: `#immobilier #${reseau.toLowerCase()} #nouveau` },
    { body: `Le saviez-vous ? Le marche immobilier evolue chaque mois. Nos experts analysent les tendances pour vous offrir les meilleures opportunites. Comme cette ${theme}.`, tags: `#immobilier #expertise #marche` },
    { body: `Visite virtuelle disponible pour cette magnifique ${theme}. Decouvrez chaque piece depuis votre canape. Lien en bio pour reserver votre creneau.`, tags: `#visiteVirtuelle #immobilier #innovation` },
    { body: `Temoignage client : "Grace a l'equipe, nous avons trouve notre maison de reve en moins de 3 semaines." Et si c'etait votre tour ?`, tags: `#temoignage #immobilier #satisfaction` },
    { body: `Estimation gratuite de votre bien en 48h. Parce que connaitre la valeur de votre propriete, c'est la premiere etape de votre prochain projet. Contactez-nous.`, tags: `#estimation #gratuit #immobilier` }
  ];

  const container = document.getElementById('posts');
  container.innerHTML = '';

  posts.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'post';
    div.innerHTML = `
      <div class="post-head">
        <div class="post-avatar">${initials}</div>
        <div><div class="post-name">Votre Agence</div><div class="post-day">${reseau}</div></div>
        <span class="sched">Planifie ${jours[i]}</span>
      </div>
      <div class="post-body">${p.body}</div>
      <div class="post-tags">${p.tags}</div>
      <div class="post-bar"><span>Aimer</span><span>Commenter</span><span>Partager</span></div>
    `;
    container.appendChild(div);
    setTimeout(() => div.classList.add('show'), 400 * (i + 1));
  });
}
</script>
</body>
</html>
