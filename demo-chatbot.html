<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Démo Chatbot IA Immobilier</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2.5rem 1rem;color:#f0efe9}
h1{font-size:clamp(1.4rem,3vw,1.8rem);text-align:center;margin-bottom:.5rem;letter-spacing:-0.02em}
.sub{text-align:center;color:rgba(240,239,233,.55);margin-bottom:2.5rem;font-size:.9rem;max-width:480px;line-height:1.7;font-weight:300}
.phone{width:360px;height:700px;background:#111;border-radius:36px;box-shadow:0 20px 80px rgba(0,0,0,.5);overflow:hidden;position:relative;border:2px solid rgba(255,255,255,.08)}
.phone-top{height:52px;background:rgba(62,207,142,.9);display:flex;align-items:center;padding:0 20px;gap:10px}
.phone-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3)}
.phone-title{color:#fff;font-size:13px;font-weight:600;flex:1;text-align:center;letter-spacing:-0.01em}
.phone-online{color:rgba(255,255,255,.7);font-size:10px;text-align:center;font-weight:400}
.chat{height:556px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.msg{max-width:82%;padding:11px 15px;border-radius:18px;font-size:13px;line-height:1.6;animation:fadeIn .3s ease;font-weight:400}
.bot{background:#1a1a1a;color:rgba(240,239,233,.85);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid rgba(255,255,255,.04)}
.user{background:#3ecf8e;color:#0a0a0a;align-self:flex-end;border-bottom-right-radius:4px;font-weight:500}
.typing{align-self:flex-start;background:#1a1a1a;padding:12px 18px;border-radius:18px;border-bottom-left-radius:4px;display:flex;gap:5px;border:1px solid rgba(255,255,255,.04)}
.typing span{width:7px;height:7px;background:rgba(255,255,255,.25);border-radius:50%;animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{to{transform:translateY(-5px);background:rgba(255,255,255,.5)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.input-bar{height:92px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 14px;gap:10px;background:#111}
.input-bar input{flex:1;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:10px 16px;font-size:13px;font-family:'Inter',sans-serif;outline:none;background:#1a1a1a;color:#f0efe9;transition:border-color .3s ease}
.input-bar input:focus{border-color:rgba(62,207,142,.4)}
.input-bar button{width:38px;height:38px;border-radius:50%;background:#3ecf8e;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s ease}
.input-bar button:hover{transform:scale(1.05)}
.input-bar button svg{fill:#0a0a0a}
.scenarios{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:1.75rem;max-width:400px}
.sc-btn{background:#111;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:9px 18px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;color:rgba(240,239,233,.7);transition:all .3s ease;font-weight:500}
.sc-btn:hover{background:#3ecf8e;color:#0a0a0a;border-color:#3ecf8e;transform:translateY(-2px)}
.badge{display:inline-block;background:rgba(62,207,142,.12);color:#3ecf8e;font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;margin-top:6px;border:1px solid rgba(62,207,142,.2)}
.cta-bottom{margin-top:2.5rem;text-align:center}
.cta-bottom a{display:inline-block;background:#3ecf8e;color:#0a0a0a;padding:.8rem 2rem;border-radius:50px;font-size:.85rem;text-decoration:none;font-weight:600;transition:all .3s ease}
.cta-bottom a:hover{transform:translateY(-2px);box-shadow:0 4px 24px rgba(62,207,142,.3)}
.cta-bottom p{color:rgba(240,239,233,.4);font-size:.78rem;margin-top:.6rem}
</style>
</head>
<body>

<h1>Votre agence, disponible 24h/24</h1>
<p class="sub">Regardez comment l'IA répond à vos prospects pendant que vous dormez.</p>

<div class="phone">
<div class="phone-top">
<div class="phone-dot"></div>
<div style="flex:1"><div class="phone-title">Agence Immobilière</div><div class="phone-online">En ligne 24/7</div></div>
<div class="phone-dot"></div>
</div>
<div class="chat" id="chat">
<div class="msg bot">Bonjour ! Je suis l'assistant de votre agence. Comment puis-je vous aider ?</div>
</div>
<div class="input-bar">
<input type="text" id="userInput" placeholder="Tapez votre message..." onkeydown="if(event.key==='Enter')sendMessage()">
<button onclick="sendMessage()"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
</div>
</div>

<div class="scenarios">
<button class="sc-btn" onclick="simulateScenario(0)">Recherche T3</button>
<button class="sc-btn" onclick="simulateScenario(1)">Estimation</button>
<button class="sc-btn" onclick="simulateScenario(2)">Prise de RDV</button>
<button class="sc-btn" onclick="simulateScenario(3)">Horaires</button>
</div>

<div class="cta-bottom">
<a href="https://ginoess.github.io">Installer ce chatbot sur mon site</a>
<p>À partir de 149 €. Configuration en 48h.</p>
</div>

<script>
const chat=document.getElementById('chat');
const scenarios=[
{user:"Bonjour, vous avez des T3 disponibles à Bezons ? Budget 250 000 €.",steps:["Oui ! Nous avons actuellement 3 appartements T3 disponibles sur Bezons dans votre budget.","Voici un aperçu :\n\n1. T3 centre-ville, 65m², 245 000 €\n2. T3 bords de Seine, 58m², 238 000 €\n3. T3 neuf, 70m², 249 000 €","Souhaitez-vous planifier une visite ? Laissez-moi votre numéro, un conseiller vous rappelle dans les 2 heures. <span class='badge'>Contact capturé</span>"]},
{user:"Je voudrais faire estimer ma maison à Argenteuil.",steps:["Bien sûr ! Nous proposons des estimations gratuites et sans engagement.","Pour vous fournir une estimation précise, j'ai besoin de quelques infos :\n\n— Type de bien (maison, appartement)\n— Surface approximative\n— Nombre de pièces\n— Adresse ou quartier","Vous pouvez aussi me laisser votre email, notre expert local vous enverra une estimation détaillée sous 48h. <span class='badge'>Contact capturé</span>"]},
{user:"Je souhaiterais visiter le T4 rue Victor Hugo.",steps:["Excellent choix ! Ce bien est encore disponible.","Nos créneaux de visite pour cette semaine :\n\n— Mercredi 14h ou 16h\n— Jeudi 10h ou 15h\n— Samedi 9h30 ou 11h","Quel créneau vous convient ? Laissez-moi votre nom et numéro, je confirme le rendez-vous immédiatement. <span class='badge'>RDV pris</span>"]},
{user:"Quels sont vos horaires d'ouverture ?",steps:["L'agence vous accueille :\n\nLundi au vendredi : 9h — 12h30 / 14h — 19h\nSamedi : 9h — 12h30","Mais grâce à moi, vous pouvez poser vos questions 24h/24 et 7j/7 ! N'hésitez pas à me dire ce que vous recherchez. <span class='badge'>Disponible 24/7</span>"]}
];
function addMessage(t,c){const d=document.createElement('div');d.className='msg '+c;d.innerHTML=t.replace(/\n/g,'<br>');chat.appendChild(d);chat.scrollTop=chat.scrollHeight}
function showTyping(){const d=document.createElement('div');d.className='typing';d.id='typing';d.innerHTML='<span></span><span></span><span></span>';chat.appendChild(d);chat.scrollTop=chat.scrollHeight}
function hideTyping(){const e=document.getElementById('typing');if(e)e.remove()}
async function simulateScenario(i){const s=scenarios[i];chat.innerHTML='<div class="msg bot">Bonjour ! Je suis l\'assistant de votre agence. Comment puis-je vous aider ?</div>';await wait(400);addMessage(s.user,'user');for(let j=0;j<s.steps.length;j++){await wait(700);showTyping();await wait(1100);hideTyping();addMessage(s.steps[j],'bot')}}
function sendMessage(){const input=document.getElementById('userInput');const t=input.value.trim();if(!t)return;input.value='';addMessage(t,'user');setTimeout(()=>{showTyping();setTimeout(()=>{hideTyping();const l=t.toLowerCase();let r="";if(l.includes("t3")||l.includes("t2")||l.includes("appartement")||l.includes("maison")||l.includes("bien")){r="Nous avons plusieurs biens correspondant à votre recherche. Pour vous envoyer une sélection personnalisée, laissez-moi votre numéro de téléphone. Un conseiller vous rappelle dans les 2 heures. <span class='badge'>Contact capturé</span>"}else if(l.includes("estim")||l.includes("vendre")||l.includes("valeur")){r="Nous proposons des estimations gratuites sous 48h. Laissez-moi votre email et l'adresse du bien, notre expert vous recontacte rapidement. <span class='badge'>Contact capturé</span>"}else if(l.includes("visite")||l.includes("rdv")||l.includes("rendez")||l.includes("voir")){r="Nos créneaux de visite sont du lundi au samedi, de 9h à 19h. Laissez-moi votre numéro et le bien qui vous intéresse, on vous rappelle pour confirmer. <span class='badge'>RDV pris</span>"}else if(l.includes("horaire")||l.includes("ouvert")||l.includes("heure")){r="L'agence est ouverte du lundi au vendredi de 9h à 12h30 et de 14h à 19h, et le samedi de 9h à 12h30. Mais je suis disponible 24/7 ! <span class='badge'>Info</span>"}else{r="Merci pour votre message ! Pour vous apporter la meilleure réponse, pourriez-vous me laisser votre email ou numéro ? Un conseiller vous recontacte dans les 2 heures. <span class='badge'>Contact capturé</span>"}addMessage(r,'bot')},1300)},400)}
function wait(ms){return new Promise(r=>setTimeout(r,ms))}
</script>
</body>
</html>
