<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Chatbot IA Immobilier</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#F5F5F0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:clamp(1.5rem,3vw,2rem);text-align:center;margin-bottom:.5rem;color:#1A1A18}
.sub{text-align:center;color:#6B6963;margin-bottom:2rem;font-size:.95rem}
.phone{width:360px;height:700px;background:#fff;border-radius:40px;box-shadow:0 20px 60px rgba(0,0,0,.12);overflow:hidden;position:relative;border:6px solid #1A1A18}
.phone-top{height:50px;background:#1D6B4F;display:flex;align-items:center;padding:0 20px;gap:10px}
.phone-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.3)}
.phone-title{color:#fff;font-size:13px;font-weight:500;flex:1;text-align:center}
.phone-online{color:rgba(255,255,255,.7);font-size:11px;text-align:center}
.chat{height:560px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.55;animation:fadeIn .3s ease}
.bot{background:#F0F0EB;color:#1A1A18;align-self:flex-start;border-bottom-left-radius:4px}
.user{background:#1D6B4F;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.typing{align-self:flex-start;background:#F0F0EB;padding:10px 18px;border-radius:16px;border-bottom-left-radius:4px;display:flex;gap:4px}
.typing span{width:7px;height:7px;background:#AAA;border-radius:50%;animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{to{transform:translateY(-5px);background:#888}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.input-bar{height:90px;border-top:1px solid #E8E6E1;display:flex;align-items:center;padding:0 12px;gap:8px;background:#fff}
.input-bar input{flex:1;border:1px solid #E0DED8;border-radius:20px;padding:10px 16px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
.input-bar input:focus{border-color:#1D6B4F}
.input-bar button{width:38px;height:38px;border-radius:50%;background:#1D6B4F;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.input-bar button svg{fill:#fff}
.scenarios{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:1.5rem;max-width:400px}
.sc-btn{background:#fff;border:1px solid #E0DED8;border-radius:20px;padding:8px 16px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;color:#1A1A18;transition:all .2s}
.sc-btn:hover{background:#1D6B4F;color:#fff;border-color:#1D6B4F}
.badge{display:inline-block;background:#E8F5EE;color:#1D6B4F;font-size:11px;font-weight:500;padding:3px 10px;border-radius:10px;margin-top:6px}
.cta-bottom{margin-top:2rem;text-align:center}
.cta-bottom a{display:inline-block;background:#1D6B4F;color:#fff;padding:.75rem 2rem;border-radius:50px;font-size:.9rem;text-decoration:none;font-weight:500}
.cta-bottom p{color:#6B6963;font-size:.8rem;margin-top:.5rem}
</style>
</head>
<body>

<h1>Votre agence, disponible 24h/24</h1>
<p class="sub">Regardez comment l'IA repond a vos prospects pendant que vous dormez.</p>

<div class="phone">
<div class="phone-top">
<div class="phone-dot"></div>
<div style="flex:1">
<div class="phone-title">Agence Immobiliere</div>
<div class="phone-online">En ligne 24/7</div>
</div>
<div class="phone-dot"></div>
</div>
<div class="chat" id="chat">
<div class="msg bot">Bonjour ! Je suis l'assistant de votre agence. Comment puis-je vous aider ?</div>
</div>
<div class="input-bar">
<input type="text" id="userInput" placeholder="Tapez votre message..." onkeydown="if(event.key==='Enter')sendMessage()">
<button onclick="sendMessage()"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
</div>
</div>

<div class="scenarios">
<button class="sc-btn" onclick="simulateScenario(0)">Recherche T3</button>
<button class="sc-btn" onclick="simulateScenario(1)">Estimation</button>
<button class="sc-btn" onclick="simulateScenario(2)">Prise de RDV</button>
<button class="sc-btn" onclick="simulateScenario(3)">Horaires</button>
</div>

<div class="cta-bottom">
<a href="https://ginoess.github.io">Installer ce chatbot sur mon site</a>
<p>A partir de 149 euros. Configuration en 48h.</p>
</div>

<script>
const chat = document.getElementById('chat');

const scenarios = [
  {
    user: "Bonjour, vous avez des T3 disponibles a Bezons ? Budget 250 000 euros.",
    steps: [
      "Oui ! Nous avons actuellement 3 appartements T3 disponibles sur Bezons dans votre budget.",
      "Voici un apercu :\n\n1. T3 centre-ville, 65m2, 245 000 euros\n2. T3 bords de Seine, 58m2, 238 000 euros\n3. T3 neuf, 70m2, 249 000 euros",
      "Souhaitez-vous planifier une visite ? Laissez-moi votre numero, un conseiller vous rappelle dans les 2 heures. <span class='badge'>Contact capture</span>"
    ]
  },
  {
    user: "Je voudrais faire estimer ma maison a Argenteuil.",
    steps: [
      "Bien sur ! Nous proposons des estimations gratuites et sans engagement.",
      "Pour vous fournir une estimation precise, j'ai besoin de quelques infos :\n\n- Type de bien (maison, appartement)\n- Surface approximative\n- Nombre de pieces\n- Adresse ou quartier",
      "Vous pouvez aussi me laisser votre email, notre expert local vous enverra une estimation detaillee sous 48h. <span class='badge'>Contact capture</span>"
    ]
  },
  {
    user: "Je souhaiterais visiter le T4 rue Victor Hugo.",
    steps: [
      "Excellent choix ! Ce bien est encore disponible.",
      "Nos creneaux de visite pour cette semaine :\n\n- Mercredi 14h ou 16h\n- Jeudi 10h ou 15h\n- Samedi 9h30 ou 11h",
      "Quel creneau vous convient ? Laissez-moi votre nom et numero, je confirme le rendez-vous immediatement. <span class='badge'>RDV pris</span>"
    ]
  },
  {
    user: "Quels sont vos horaires d'ouverture ?",
    steps: [
      "L'agence vous accueille :\n\nLundi au vendredi : 9h - 12h30 / 14h - 19h\nSamedi : 9h - 12h30",
      "Mais grace a moi, vous pouvez poser vos questions 24h/24 et 7j/7 ! N'hesitez pas a me dire ce que vous recherchez. <span class='badge'>Disponible 24/7</span>"
    ]
  }
];

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function simulateScenario(index) {
  const sc = scenarios[index];
  chat.innerHTML = '<div class="msg bot">Bonjour ! Je suis l\'assistant de votre agence. Comment puis-je vous aider ?</div>';

  await wait(500);
  addMessage(sc.user, 'user');

  for (let i = 0; i < sc.steps.length; i++) {
    await wait(800);
    showTyping();
    await wait(1200);
    hideTyping();
    addMessage(sc.steps[i], 'bot');
  }
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'user');

  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      hideTyping();
      const lower = text.toLowerCase();
      let rep = "";
      if (lower.includes("t3") || lower.includes("t2") || lower.includes("appartement") || lower.includes("maison") || lower.includes("bien")) {
        rep = "Nous avons plusieurs biens correspondant a votre recherche. Pour vous envoyer une selection personnalisee, laissez-moi votre numero de telephone. Un conseiller vous rappelle dans les 2 heures. <span class='badge'>Contact capture</span>";
      } else if (lower.includes("estim") || lower.includes("vendre") || lower.includes("valeur")) {
        rep = "Nous proposons des estimations gratuites sous 48h. Laissez-moi votre email et l'adresse du bien, notre expert vous recontacte rapidement. <span class='badge'>Contact capture</span>";
      } else if (lower.includes("visite") || lower.includes("rdv") || lower.includes("rendez") || lower.includes("voir")) {
        rep = "Nos creneaux de visite sont du lundi au samedi, de 9h a 19h. Laissez-moi votre numero et le bien qui vous interesse, on vous rappelle pour confirmer. <span class='badge'>RDV pris</span>";
      } else if (lower.includes("horaire") || lower.includes("ouvert") || lower.includes("heure")) {
        rep = "L'agence est ouverte du lundi au vendredi de 9h a 12h30 et de 14h a 19h, et le samedi de 9h a 12h30. Mais je suis disponible 24/7 ! <span class='badge'>Info</span>";
      } else {
        rep = "Merci pour votre message ! Pour vous apporter la meilleure reponse, pourriez-vous me laisser votre email ou numero ? Un conseiller vous recontacte dans les 2 heures. <span class='badge'>Contact capture</span>";
      }
      addMessage(rep, 'bot');
    }, 1500);
  }, 500);
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>

</body>
</html>
